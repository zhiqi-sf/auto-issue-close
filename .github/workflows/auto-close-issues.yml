name: Auto Close Issues

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  close-issues:
    runs-on: ubuntu-latest
    if: contains(github.event.label.name, 'completed') || contains(github.event.label.name, 'wontfix')
    
    steps:
      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const label = context.payload.label.name;
            
            let comment_body = '';
            if (label === 'completed') {
              comment_body = 'This issue has been automatically closed because it was labeled as completed. 🎉';
            } else if (label === 'wontfix') {
              comment_body = 'This issue has been automatically closed because it was labeled as wontfix. ❌';
            }
            
            // Add comment before closing
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: comment_body
            });
            
            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              state: 'closed'
            });
            
            console.log(`Issue #${issue_number} has been closed due to label: ${label}`);